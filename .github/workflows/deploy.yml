name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  NODE_ENV: 'production'
  MISE_EXPERIMENTAL: true
  WRANGLER_SEND_METRICS: false
  NODE_OPTIONS: '--disable-warning=ExperimentalWarning --disable-warning=DeprecationWarning'

permissions: {}

jobs:
  deploy:
    name: 'Deploy'
    timeout-minutes: 3
    runs-on: ['ubuntu-latest']
    permissions:
      contents: read
      id-token: write
    steps:
      - name: '🔑 Checkout'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 'Run Checks'
        uses: ./.github/actions/checks

      - name: 'Set App Version'
        run: |
          echo "APP_VERSION=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: '🔸 Cloudflare Workers - Deploy'
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bun x wrangler@latest deploy \
            --config='wrangler.json' \
            --keep-vars \
            --var 'NODE_ENV:production' \
            --var 'APP_VERSION:${{ env.APP_VERSION }}'
