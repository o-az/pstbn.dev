name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  ACTIONS_RUNNER_DEBUG: true
  WRANGLER_SEND_METRICS: false

jobs:
  deploy:
    name: "Deploy"
    timeout-minutes: 3
    runs-on: ["ubuntu-latest"]
    steps:
      - name: "🔑 Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "🔍 Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"

      - name: "🐰 Setup Bun"
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: "Install Dependencies"
        run: bun install --frozen-lockfile

      - name: "Lint, Check, Build"
        run: |
          bun tsgo --project tsconfig.json --noEmit
          bun vite --mode='production' --config='vite.config.ts' build

      - name: "Set App Version"
        run: |
          echo "APP_VERSION=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: "🔸 Cloudflare Workers - Deploy"
        env:
          APP_VERSION: ${{ env.APP_VERSION }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bun x wrangler@latest deploy \
            --config='wrangler.json' \
            --keep-vars \
            --var 'NODE_ENV:production' \
            --var 'APP_VERSION:${{ env.APP_VERSION }}'
