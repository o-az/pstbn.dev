name: "Publish"

on:
  push:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  ACTIONS_RUNNER_DEBUG: true

jobs:
  changesets:
    name: "Changesets 🦋"
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: "🔑 Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: "Install Dependencies"
        run: |
          npm add --global bun@latest
          bun install --frozen-lockfile

      - name: "Setup Git"
        run: |
          git config --local user.name "o-az"
          git config --local user.email "omaraziz.dev@gmail.com"

      - name: "Pull Request || Publish"
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        env:
          NPM_CONFIG_PROVENANCE: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: bun changeset:publish
          version: bun changeset:version
          title: "chore: version package"
          commit: "chore: version package"
          setupGitUser: false
          createGithubReleases: ${{ github.ref == 'refs/heads/main' }}

      - name: "Publish Canary Release"
        if: steps.changesets.outputs.published != 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git reset --hard origin/main
          bun changeset version --no-git-tag --snapshot canary
          bun run build
          bun changeset publish --no-git-tag --snapshot canary --tag canary
